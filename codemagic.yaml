workflows:
  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m2

    environment:
      flutter: 3.35.3
      xcode: 16.4

    scripts:
      - name: Flutter clean
        script: |
          flutter clean
          flutter pub get

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.app